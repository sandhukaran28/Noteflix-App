services:
  api:
    build: ./backend
    container_name: noteflix-api
    expose:
      - "8080"
    ports:
      - "8080:8080"   # keep direct access for healthcheck/debugging
    volumes:
      - noteflix-data:/data
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - DATA_ROOT=/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m       # leave ~250 MB on a 1 GB t3.micro for OS + Caddy
    mem_limit: 768m          # for non-swarm docker compose
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    container_name: noteflix-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - BACKEND_DOMAIN=${BACKEND_DOMAIN:?set BACKEND_DOMAIN in .env or shell}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  noteflix-data:
  caddy-data:
  caddy-config:
